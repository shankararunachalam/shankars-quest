{{- $homeURL := .Site.Home.RelPermalink -}}
<header class="site-header">
  <div>
    <h1 class="site-title">
      <a href="{{ $homeURL }}">{{ .Site.Title }}</a>
    </h1>
    {{- with .Site.Params.tagline }}
    <p class="site-tagline">{{ . }}</p>
    {{- end }}
  </div>
  <nav class="site-nav" aria-label="primary">
    {{- range .Site.Menus.main }}
    <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
    {{- end }}
    <button type="button" class="theme-toggle" aria-label="toggle theme" data-theme-toggle>
      <span data-theme-icon>auto</span>
    </button>
  </nav>
</header>
