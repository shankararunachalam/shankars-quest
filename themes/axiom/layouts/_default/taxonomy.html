{{ define "main" }}
<div class="listing site-narrow">
  <header class="post-header">
    {{- if eq .Kind "term" }}
    <span class="section-heading-eyebrow">{{ .Data.Singular }}</span>
    {{- end }}
    <h1 class="post-title">{{ .Title }}</h1>
    {{- with .Content }}
    <div class="post-content">{{ . }}</div>
    {{- end }}
  </header>

  <ul class="post-list">
    {{- range .Pages.ByDate.Reverse }}
      {{ partial "post-card.html" . }}
    {{- end }}
  </ul>
</div>
{{ end }}
