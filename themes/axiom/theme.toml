name = "axiom"
license = "MIT"
licenselink = "https://github.com/shankararunachalam/hugo-theme-axiom/blob/main/LICENSE"
description = "A quiet editorial Hugo theme for personal blogs that span several project threads. Each post belongs to a trail; a trail-adaptive section break and a per-trail accent colour give the threads distinct identities without fragmenting the design."
homepage = "https://github.com/shankararunachalam/hugo-theme-axiom"
tags = ["blog", "editorial", "minimal", "personal", "multi-trail"]
features = ["light/dark mode", "trail categorization", "trail-adaptive section breaks", "reading time", "rss"]
min_version = "0.140.0"

[author]
  name = "Shankar Arunachalam"
  homepage = "https://shankararunachalam.com"
